
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RUET CGPA Calculator</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#134E5E,#71B280);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:15px;
}

.container{
background:white;
padding:25px;
border-radius:12px;
width:95%;
max-width:550px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
font-size:26px;
}

.course{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
font-size:16px;
}

input{
width:80px;
padding:8px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.grade{
width:50px;
text-align:center;
font-weight:bold;
font-size:16px;
}

.result{
text-align:center;
font-size:26px;
margin-top:20px;
font-weight:bold;
}

@media (max-width:480px){

.course{
font-size:14px;
}

input{
width:70px;
}

}

</style>

</head>

<body>

<div class="container">

<h2>RUET CGPA Calculator</h2>

<div class="course">Circuits & Systems II (3) <input id="m1" type="number" oninput="calc()"> <span id="g1" class="grade"></span></div>
<div class="course">C&S II Sessional (0.75) <input id="m2" type="number" oninput="calc()"> <span id="g2" class="grade"></span></div>
<div class="course">OOP (3) <input id="m3" type="number" oninput="calc()"> <span id="g3" class="grade"></span></div>
<div class="course">OOP Lab (1.5) <input id="m4" type="number" oninput="calc()"> <span id="g4" class="grade"></span></div>
<div class="course">Analog Circuits (3) <input id="m5" type="number" oninput="calc()"> <span id="g5" class="grade"></span></div>
<div class="course">Analog Lab (0.75) <input id="m6" type="number" oninput="calc()"> <span id="g6" class="grade"></span></div>
<div class="course">Math 1217 (3) <input id="m7" type="number" oninput="calc()"> <span id="g7" class="grade"></span></div>
<div class="course">Humanities (3) <input id="m8" type="number" oninput="calc()"> <span id="g8" class="grade"></span></div>
<div class="course">Engineering Ethics (0.75) <input id="m9" type="number" oninput="calc()"> <span id="g9" class="grade"></span></div>

<div class="result" id="cgpa">CGPA : 0.00</div>

</div>

<script>

const credits=[3,0.75,3,1.5,3,0.75,3,3,0.75]

function getGrade(mark){

if(mark>=80) return ["A+",4]
if(mark>=75) return ["A",3.75]
if(mark>=70) return ["A-",3.5]
if(mark>=65) return ["B+",3.25]
if(mark>=60) return ["B",3]
if(mark>=55) return ["B-",2.75]
if(mark>=50) return ["C+",2.5]
if(mark>=45) return ["C",2.25]
if(mark>=40) return ["D",2]
return ["F",0]

}

function calc(){

let totalPoints=0
let totalCredits=0

for(let i=1;i<=9;i++){

let mark=parseFloat(document.getElementById("m"+i).value)

if(!isNaN(mark)){

let grade=getGrade(mark)

document.getElementById("g"+i).innerText=grade[0]

totalPoints+=grade[1]*credits[i-1]
totalCredits+=credits[i-1]

}else{
document.getElementById("g"+i).innerText=""
}

}

let cgpa= totalCredits ? totalPoints/totalCredits : 0

document.getElementById("cgpa").innerText="CGPA : "+cgpa.toFixed(2)

}

</script>

</body>
</html>
